{% extends 'app/base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold">Lista de Pessoas</h4>
        <a href="{% url 'pessoa_criar' %}" class="btn btn-sm btn-success rounded-pill px-3 fw-bold">+ Nova Pessoa</a>
    </div>
    <div class="card-body">
        <table class="table table-dark table-striped table-hover mt-2 align-middle">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Ocupação</th>
                    <th class="text-end">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for pessoa in pessoas %}
                <tr>
                    <td><strong>{{ pessoa.nome }}</strong></td>
                    <td>{{ pessoa.email }}</td>
                    <td>{{ pessoa.ocupacao.nome }}</td>
                    <td class="text-end">
                        <a href="{% url 'pessoa_editar' pessoa.id %}" class="btn btn-sm btn-outline-warning rounded-pill px-3">Editar</a>
                        <a href="{% url 'pessoa_excluir' pessoa.id %}" class="btn btn-sm btn-outline-danger rounded-pill px-3 ms-1">Excluir</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center text-secondary py-4">Nenhuma pessoa cadastrada ainda.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
