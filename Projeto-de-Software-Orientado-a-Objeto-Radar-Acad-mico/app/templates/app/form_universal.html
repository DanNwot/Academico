{% extends 'app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card mt-4">
            <div class="card-header py-3">
                <h4 class="mb-0 text-white">
                    <i class="bi bi-pencil-square me-2"></i> {{ acao|default:"Formulário" }}
                </h4>
            </div>
            <div class="card-body p-4">
                
                <form method="post" action="">
                    {% csrf_token %}
                    
                    <div class="text-light">
                        {{ form.as_p }}
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <a href="javascript:history.back()" class="btn btn-outline-light me-2 px-4 rounded-pill">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4 rounded-pill">Salvar Dados</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
