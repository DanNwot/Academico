{% extends 'app/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0 fw-bold">{{ acao }}</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex justify-content-end mt-4">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary me-2 rounded-pill px-4">Cancelar</a>
                        <button type="submit" class="btn btn-success rounded-pill px-4 fw-bold">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
