{% extends 'app/base.html' %}
{% block content %}
<div class="card shadow-sm border-0"><div class="card-header bg-info text-white"><h4 class="mb-0">Cidades</h4></div>
    <div class="card-body"><table class="table table-striped mt-3">
        <thead><tr><th>Nome</th><th>UF</th></tr></thead>
        <tbody>
            {% for cid in cidades %}<tr><td>{{ cid.nome }}</td><td>{{ cid.uf }}</td></tr>
            {% empty %}<tr><td colspan="2">Nenhuma cidade cadastrada.</td></tr>{% endfor %}
        </tbody>
    </table></div>
</div>
{% endblock %}
