{% extends 'app/base.html' %}
{% block content %}
<div class="card shadow-sm border-0"><div class="card-header bg-secondary text-white"><h4 class="mb-0">Ocupações</h4></div>
    <div class="card-body"><table class="table table-striped mt-3">
        <thead><tr><th>Nome da Ocupação</th></tr></thead>
        <tbody>
            {% for ocu in ocupacoes %}<tr><td>{{ ocu.nome }}</td></tr>
            {% empty %}<tr><td>Nenhuma ocupação cadastrada.</td></tr>{% endfor %}
        </tbody>
    </table></div>
</div>
{% endblock %}
