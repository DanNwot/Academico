<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar-Acad | Gestão Acadêmica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS Customizado: Fundo Gradiente Moderno e Tipografia */
        body {
            background: linear-gradient(135deg, #121212 0%, #2b2b2b 100%);
            background-attachment: fixed; /* Mantém o fundo estático ao rolar a página */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Estilização da Navbar (Barra de Navegação) */
        .navbar {
            background-color: rgba(18, 18, 18, 0.85) !important;
            backdrop-filter: blur(10px); /* Efeito de vidro */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative; /* Garante que o z-index funcione corretamente */
            z-index: 1050;      /* Força a Navbar e o Dropdown a ficarem acima dos cards */
        }

        /* Padronização dos Cards para o tema B&W */
        .card {
            background-color: rgba(30, 30, 30, 0.6) !important;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        /* Força os cabeçalhos das tabelas a seguirem o tom escuro elegante */
        .card-header {
            background: linear-gradient(90deg, #1f1f1f 0%, #3a3a3a 100%) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }

        /* Conteúdo Principal para empurrar o rodapé para baixo */
        main {
            flex: 1;
        }

        /* Efeito Hover nos botões e links */
        a.nav-link:hover {
            color: #ffffff !important;
            text-shadow: 0px 0px 8px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark py-3 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-white fs-4" href="{% url 'home' %}">
                <span style="color: #9e9e9e;">Radar</span>-Acad
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-4">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Início</a></li>
                    
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Cadastros Base</a>
                        <ul class="dropdown-menu dropdown-menu-dark">
                            <li><a class="dropdown-item" href="{% url 'area_saber_list' %}">Áreas do Saber</a></li>
                            <li><a class="dropdown-item" href="{% url 'ocupacao_list' %}">Ocupações</a></li>
                            <li><a class="dropdown-item" href="{% url 'turno_list' %}">Turnos</a></li>
                            <li><a class="dropdown-item" href="{% url 'cidade_list' %}">Cidades</a></li>
                        </ul>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Acadêmico</a>
                        <ul class="dropdown-menu dropdown-menu-dark">
                            <li><a class="dropdown-item" href="{% url 'pessoa_list' %}">Pessoas</a></li>
                            <li><a class="dropdown-item" href="{% url 'instituicao_list' %}">Instituições</a></li>
                            <li><a class="dropdown-item" href="{% url 'curso_list' %}">Cursos</a></li>
                            <li><a class="dropdown-item" href="{% url 'turma_list' %}">Turmas</a></li>
                            <li><a class="dropdown-item" href="{% url 'disciplina_list' %}">Disciplinas</a></li>
                        </ul>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="btn btn-outline-light px-4 rounded-pill" href="/admin/" target="_blank">Painel Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-4 mt-auto" style="background-color: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.05);">
        <div class="container text-secondary">
            <small>&copy; 2026 Radar-Acad. Sistema de Gestão Educacional.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
