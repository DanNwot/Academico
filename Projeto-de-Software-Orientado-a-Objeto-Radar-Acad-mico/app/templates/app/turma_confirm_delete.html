{% extends 'app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-4 border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirmar Exclusão</h4>
            </div>
            <div class="card-body p-4 text-center">
                <h5 class="text-white mb-4">Você tem certeza que deseja excluir a turma: <br><strong class="text-danger">"{{ obj.nome }}"</strong>?</h5>
                <p class="text-secondary small mb-4">Esta ação não poderá ser desfeita.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <a href="{% url 'turma_list' %}" class="btn btn-outline-secondary rounded-pill px-4 me-2">Cancelar</a>
                    <button type="submit" class="btn btn-danger rounded-pill px-4">Sim, Excluir</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
