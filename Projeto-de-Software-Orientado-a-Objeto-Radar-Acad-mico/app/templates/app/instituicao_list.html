{% extends 'app/base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header bg-warning text-dark">
        <h4 class="mb-0">Listagem de Instituições de Ensino</h4>
    </div>
    <div class="card-body">
        <table class="table table-striped table-hover mt-3">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Site</th>
                    <th>Telefone</th>
                    <th>Cidade</th>
                </tr>
            </thead>
            <tbody>
                {% for inst in instituicoes %}
                <tr>
                    <td><strong>{{ inst.nome }}</strong></td>
                    <td><a href="{{ inst.site }}" target="_blank">{{ inst.site }}</a></td>
                    <td>{{ inst.telefone }}</td>
                    <td>{{ inst.cidade }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center">Nenhuma instituição cadastrada.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
