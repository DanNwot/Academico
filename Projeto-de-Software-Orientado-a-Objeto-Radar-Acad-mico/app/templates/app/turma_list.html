{% extends 'app/base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header bg-info text-white">
        <h4 class="mb-0">Lista de Turmas</h4>
    </div>
    <div class="card-body">
        <table class="table table-striped table-hover mt-3">
            <thead>
                <tr>
                    <th>Nome da Turma</th>
                    <th>Curso Pertencente</th>
                </tr>
            </thead>
            <tbody>
                {% for turma in turmas %}
                <tr>
                    <td><strong>{{ turma.nome }}</strong></td>
                    <td>{{ turma.curso.nome }}</td> </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center">Nenhuma turma cadastrada ainda.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
