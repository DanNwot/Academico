{% extends 'app/base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold">Lista de Turmas</h4>
        <a href="{% url 'turma_criar' %}" class="btn btn-sm btn-success rounded-pill px-3 fw-bold">+ Nova Turma</a>
    </div>
    <div class="card-body">
        <table class="table table-dark table-striped table-hover mt-2 align-middle">
            <thead>
                <tr>
                    <th>Nome da Turma</th>
                    <th>Curso Pertencente</th>
                    <th class="text-end">Ações</th> </tr>
            </thead>
            <tbody>
                {% for turma in turmas %}
                <tr>
                    <td><strong>{{ turma.nome }}</strong></td>
                    <td>{{ turma.curso.nome }}</td>
                    <td class="text-end">
                        <a href="{% url 'turma_editar' turma.id %}" class="btn btn-sm btn-outline-warning rounded-pill px-3">Editar</a>
                        <a href="{% url 'turma_excluir' turma.id %}" class="btn btn-sm btn-outline-danger rounded-pill px-3 ms-1">Excluir</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center text-secondary py-4">Nenhuma turma cadastrada ainda.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
