{% extends 'app/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-white"><i class="bi bi-people-fill"></i> Lista de Turmas</h2>
    <a href="{% url 'turma_criar' %}" class="btn btn-success fw-bold">+ Nova Turma</a>
</div>
<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-dark table-hover mb-0">
                <thead class="card-header">
                    <tr>
                        <th>Nome da Turma</th>
                        <th>Curso Pertencente</th>
                        <th width="20%" class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for turma in turmas %}
                    <tr>
                        <td><strong>{{ turma.nome }}</strong></td>
                        <td>{{ turma.curso.nome }}</td>
                        <td class="text-center">
                            <a href="{% url 'turma_editar' turma.id %}" class="btn btn-sm btn-outline-warning">Editar</a>
                            <a href="{% url 'turma_excluir' turma.id %}" class="btn btn-sm btn-outline-danger">Excluir</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center text-muted py-3">Nenhuma turma cadastrada ainda.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
