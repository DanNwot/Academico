{% extends 'app/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-white"><i class="bi bi-calendar-event"></i> Calendário e Eventos</h2>
    <a href="{% url 'evento_criar' %}" class="btn btn-success fw-bold">+ Novo Evento</a>
</div>
<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-dark table-hover mb-0">
                <thead class="card-header">
                    <tr>
                        <th>Data</th>
                        <th>Título do Evento</th>
                        <th>Público Alvo</th>
                        <th width="20%" class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for e in eventos %}
                    <tr>
                        <td>{{ e.data_evento|date:"d/m/Y" }}</td>
                        <td><strong>{{ e.titulo }}</strong></td>
                        <td>{{ e.publico }}</td>
                        <td class="text-center">
                            <a href="{% url 'evento_editar' e.id %}" class="btn btn-sm btn-outline-warning">Editar</a>
                            <a href="{% url 'evento_excluir' e.id %}" class="btn btn-sm btn-outline-danger">Excluir</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center text-muted py-3">Nenhum evento agendado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
