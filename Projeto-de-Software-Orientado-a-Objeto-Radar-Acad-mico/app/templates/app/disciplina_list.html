{% extends 'app/base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Lista de Disciplinas</h4>
    </div>
    <div class="card-body">
        <table class="table table-striped table-hover mt-3">
            <thead>
                <tr>
                    <th>Nome da Disciplina</th>
                    <th>Área do Saber</th>
                </tr>
            </thead>
            <tbody>
                {% for disciplina in disciplinas %}
                <tr>
                    <td><strong>{{ disciplina.nome }}</strong></td>
                    <td>{{ disciplina.area_saber.nome }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center">Nenhuma disciplina cadastrada.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
