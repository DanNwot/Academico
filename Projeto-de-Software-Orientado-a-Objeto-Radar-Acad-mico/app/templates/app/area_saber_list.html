{% extends 'app/base.html' %}
{% block content %}
<div class="card shadow-sm border-0"><div class="card-header bg-secondary text-white"><h4 class="mb-0">Áreas do Saber</h4></div>
    <div class="card-body"><table class="table table-striped mt-3">
        <thead><tr><th>Nome da Área</th></tr></thead>
        <tbody>
            {% for area in areas %}<tr><td>{{ area.nome }}</td></tr>
            {% empty %}<tr><td>Nenhuma área cadastrada.</td></tr>{% endfor %}
        </tbody>
    </table></div>
</div>
{% endblock %}
